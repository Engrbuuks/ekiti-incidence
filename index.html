/* ===================== SHARED CHROME ===================== */
function AppHeader({onBack, showBack, online, role}){
  const roleLabel = role ? role.charAt(0).toUpperCase()+role.slice(1) : '';
  return (
    <header className="top-header">
      <div className="title-banner">INCIDENT MANAGEMENT SYSTEM, EKITI 2026</div>
      <div className="header-row">
        {showBack
          ? <button className="icon-button" onClick={onBack} aria-label="Back"><Ic d={P.back}/></button>
          : <span style={{width:40}} />}
        <img src={LOGO} className="logo" alt="The BRAVO"/>
        <div className="header-actions">
          <div className="bell-wrap"><Ic d={P.bell}/><span className="notify-dot">3</span></div>
          <div className={`online ${online?'':'offline'}`}><span></span>{online?'Online':'Offline'}</div>
        </div>
      </div>
      {roleLabel && <div className="role-strip">Signed in as <strong>{roleLabel}</strong></div>}
    </header>
  );
}
function BottomNav({active, onTab}){
  const items=[[P.home,'Home','home'],[P.reports,'Reports','reports'],[P.sync,'Sync','sync'],[P.profile,'Profile','profile']];
  return (<footer className="bottom-nav">
    {items.map(([d,label,key])=>(
      <button key={label} className={active===key?'active':''} onClick={()=>onTab(key)}>
        <Ic d={d}/><span>{label}</span>
      </button>))}
  </footer>);
}

/* derived totals + counts */
const TOTAL_LGAS = DATA.lgas.length;
const TOTAL_WARDS = DATA.lgas.reduce((a,L)=>a+L.w.length,0);
const TOTAL_PUS = DATA.lgas.reduce((a,L)=>a+L.w.reduce((b,w)=>b+w.p.length,0),0);
const wardCount = (L)=>L.w.length;
const puCount = (L)=>L.w.reduce((b,w)=>b+w.p.length,0);

/* flat search index across LGA / ward / PU */
const SEARCH_INDEX = (()=>{
  const idx=[];
  DATA.lgas.forEach((L,li)=>{
    idx.push({kind:'lga', label:L.n, sub:`${wardCount(L)} wards • ${puCount(L)} PUs`, li});
    L.w.forEach((w,wi)=>{
      idx.push({kind:'ward', label:w.n, sub:`${L.n} • ${w.p.length} PUs`, li, wi});
      w.p.forEach((p,pi)=>{
        idx.push({kind:'pu', label:p[1], sub:`${p[0]} • ${w.n}, ${L.n}`, code:p[0], li, wi, pi});
      });
    });
  });
  return idx;
})();

function StatCard({d,value,label,tone,onClick}){
  const inner=(<><Ic d={d} className={tone||'green'} size={30}/><strong className={tone||''}>{value}</strong><span>{label}</span></>);
  if(onClick) return <button className="stat-card tappable" onClick={onClick}>{inner}</button>;
  return <article className="stat-card">{inner}</article>;
}

function LgaScreen({go, incidents, onStatusFilter}){
  const [q,setQ]=useState("");
  const query=q.toLowerCase().trim();

  // global search across all levels once the user types 2+ chars
  const results=useMemo(()=>{
    if(query.length<2) return null;
    return SEARCH_INDEX.filter(r=>r.label.toLowerCase().includes(query)||(r.code&&r.code.includes(query))).slice(0,40);
  },[query]);

  const c = {
    open: incidents.filter(i=>i.status==='Open').length,
    progress: incidents.filter(i=>i.status==='In Progress').length,
    escalated: incidents.filter(i=>i.status==='Escalated').length,
    resolved: incidents.filter(i=>i.status==='Resolved').length,
    total: incidents.length,
  };

  const goResult=(r)=>{
    const L=DATA.lgas[r.li];
    if(r.kind==='lga') return go('wards',{lgaIndex:r.li});
    if(r.kind==='ward') return go('pus',{lgaIndex:r.li, wardIndex:r.wi});
    if(r.kind==='pu') return go('pu',{lgaIndex:r.li, wardIndex:r.wi, puIndex:r.pi});
  };

  return (<>
    <section className="search-wrap">
      <Ic d={P.search} size={26}/>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search LGA, Ward, or Polling Unit"/>
      {q && <button aria-label="Clear" onClick={()=>setQ("")}><Ic d={P.close} size={20}/></button>}
    </section>

    {results ? (
      <section className="lga-section">
        <h1 className="sec-title">SEARCH RESULTS ({results.length}{results.length===40?'+':''})</h1>
        <div className="lga-list">
          {results.map((r,i)=>(
            <button className="result-row" key={i} onClick={()=>goResult(r)}>
              <span className={`result-kind ${r.kind}`}>{r.kind.toUpperCase()}</span>
              <span className="result-copy"><strong>{r.label}</strong><small>{r.sub}</small></span>
              <Ic d={P.chevR} size={22}/>
            </button>))}
          {results.length===0 && <div className="empty-state"><Ic d={P.search} size={34}/><strong>No match</strong><p>Try a different LGA, ward, PU name or code.</p></div>}
        </div>
      </section>
    ) : (<>
      <section className="stats-grid">
        <StatCard d={P.building} value={TOTAL_LGAS} label="LGAs"/>
        <StatCard d={P.users} value={TOTAL_WARDS} label="Wards"/>
        <StatCard d={P.pin} value={TOTAL_PUS.toLocaleString()} label="Polling Units"/>
      </section>
      <h2 className="sec-title">INCIDENTS BY STATUS</h2>
      <section className="status-grid">
        <StatCard d={P.alert} value={c.open} label="Open" tone="red" onClick={()=>onStatusFilter('Open')}/>
        <StatCard d={P.clock} value={c.progress} label="In Progress" tone="amber" onClick={()=>onStatusFilter('In Progress')}/>
        <StatCard d={P.up} value={c.escalated} label="Escalated" tone="red" onClick={()=>onStatusFilter('Escalated')}/>
        <StatCard d={P.checkCircle} value={c.resolved} label="Resolved" tone="green" onClick={()=>onStatusFilter('Resolved')}/>
        <StatCard d={P.reports} value={c.total} label="Total" tone="muted" onClick={()=>onStatusFilter('All')}/>
      </section>
      <section className="lga-section">
        <h1 className="sec-title">LOCAL GOVERNMENT AREAS ({TOTAL_LGAS})</h1>
        <div className="lga-list">
          {DATA.lgas.map((L,li)=>(
            <button className="lga-card" key={L.n} onClick={()=>go('wards',{lgaIndex:li})}>
              <span className="lga-icon"><Ic d={P.building} size={32}/></span>
              <span className="lga-copy">
                <strong>{L.n}</strong>
                <small>{wardCount(L)} Wards <b>•</b> {puCount(L)} PUs</small>
              </span>
              <Ic d={P.chevR} size={26}/>
            </button>))}
        </div>
      </section>
    </>)}
  </>);
}

function EscalationContacts({lgaName, wardName, contacts, label='ESCALATION CONTACTS (WARD LEVEL)'}){
  const map = (contacts && Object.keys(contacts).length) ? contacts : SAMPLE_CONTACTS;
  const list = (map[`${lgaName}|${wardName}`] || []).filter(c=>c.name && c.phone);
  if(list.length===0){
    return (
      <section className="escalation-card empty">

        <p className="esc-empty">No contacts loaded for this ward yet. Add this ward's row to the Contacts tab (Coordinator, Police, Party Leader, Extra) and it will appear here.</p>

  return (
    <section className="escalation-card">
      <h2>{label}</h2>

          <div className={`esc-item ${i>0?'divided':''}`} key={i}>

/* ===================== SCREEN 5 : INCIDENT DETAILS ===================== */
function DetailScreen({item, perms={}, incidents=[], onUpdateStatus}){
  const base = item || {};
  // use the live version from the list (reflects status changes), fall back to passed item
  const it = incidents.find(x=>x.ref===base.ref) || base;
  const [picking,setPicking]=useState(false);
  const [busy,setBusy]=useState(false);
  const loc = it.lga ? <>{it.puName}<br/>{it.ward}, {it.lga} ({it.puCode})</> : <>—</>;
  const dateStr = it.date && it.time ? `${it.date}  •  ${it.time}` : (it.time||'—');

  const STATUSES = perms.canResolve
    ? ['Open','In Progress','Escalated','Resolved']
    : ['Open','In Progress','Escalated'];   // non-managers can't resolve

  const doStatus=(s)=>{
    if(!onUpdateStatus) return;
    setBusy(true);
    Promise.resolve(onUpdateStatus(it.ref, s)).then(()=>{ setBusy(false); setPicking(false); });
  };
  const escalate=()=>doStatus('Escalated');

  const statusTone = it.status==='Resolved'?'soft-green':(it.status==='In Progress'?'soft-amber':'soft-red');

  return (<>
    <nav className="breadcrumbs"><span>{it.lga||'—'}</span><b>›</b><span>{it.ward||'—'}</span><b>›</b><span>PU {it.puCode?it.puCode.split('/').pop():'—'}</span><b>›</b><em>Incident Details</em></nav>
    <section className="title-row">
      <div className="incident-avatar"><Ic d={P.users}/></div>
      <div><h1 className="screen-h1 nm">Incident Details</h1><div className="title-meta"><span className={`badge ${it.status==='Resolved'?'outline-green':'outline-red'}`}>{it.status||'Open'}</span><span>{it.ref||'INC-PENDING'}</span></div></div>
      <button className="menu-button"><Ic d={P.menu}/></button>
    </section>
    <section className="details-card">
      <div className="detail-row"><div className="detail-icon red"><TagIc/></div><div className="detail-label">Incident Type</div><div className="detail-value">{it.title||'—'}</div></div>
      <div className="detail-row"><div className="detail-icon orange"><Ic d={P.alert}/></div><div className="detail-label">Severity</div><div className="detail-value"><span className="badge soft-red">{it.sev||'—'}</span></div></div>
      <div className="detail-row"><div className="detail-icon green"><Ic d={P.calendar}/></div><div className="detail-label">Time of Occurrence</div><div className="detail-value">{dateStr}</div></div>
      <div className="detail-row"><div className="detail-icon green"><Ic d={P.user}/></div><div className="detail-label">Reporter</div><div className="detail-value">{it.reporter||'—'}{it.reporterPhone && <><br/><a className="detail-phone" href={`tel:${it.reporterPhone}`}><Ic d={P.phone} size={15}/>{it.reporterPhone}</a></>}</div></div>
      <div className="detail-row"><div className="detail-icon blue"><LocIc/></div><div className="detail-label">Location</div><div className="detail-value">{loc}</div></div>
      <div className="detail-row"><div className="detail-icon blue"><Ic d={P.doc}/></div><div className="detail-label">Description</div><div className="detail-value">{it.desc||'—'}</div></div>
      <div className="detail-row"><div className="detail-icon green"><Ic d={P.checkCircle}/></div><div className="detail-label">Status</div><div className="detail-value"><span className={`badge ${statusTone}`}>{it.status||'Open'}</span></div></div>
    </section>
    {(it.photo||it.photoLink) && <section className="photo-section"><h2 className="sec-title nm">Photo (1)</h2><div className="photo-card"><img src={it.photo||it.photoLink} alt="Incident evidence"/><span><Ic d={P.zoom}/></span></div></section>}

    {(perms.canUpdateStatus || perms.canEscalate) ? (
      <section className="actions"><h2 className="sec-title nm">Actions</h2>
        {picking ? (
          <div className="status-picker">
            <p className="status-picker-title">Set status to:</p>
            <div className="status-options">
              {STATUSES.map(s=>(
                <button key={s} className={`status-opt ${it.status===s?'on':''}`} disabled={busy} onClick={()=>doStatus(s)}>{s}</button>
              ))}
            </div>
            <button className="ghost-btn full" disabled={busy} onClick={()=>setPicking(false)}>Cancel</button>
          </div>
        ) : (
          <div className="action-grid">
            {perms.canUpdateStatus && <button className="green" onClick={()=>setPicking(true)}><Ic d={P.edit}/>Update Status</button>}
            {perms.canEscalate && <button className="red" disabled={busy} onClick={escalate}><Ic d={P.up}/>Escalate</button>}
          </div>
        )}
      </section>
    ) : (
      <section className="actions"><p className="readonly-note">You have view-only access to this incident.</p></section>
    )}
  </>);
}

const INCIDENT_TYPES=['Violence / Intimidation','BVAS Issue','Security Concern','Ballot Material Issue','Voter Suppression','Logistics Delay','Other'];

const nowParts=()=>{
  const d=new Date();
  const date=d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  const time=d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  return {date,time};
};

  const [wi,setWi]=useState(ctx?.wardIndex ?? '');
  const [pi,setPi]=useState(ctx?.puIndex ?? '');
  const {date,time}=useMemo(nowParts,[]);

  const L = li!=='' ? DATA.lgas[li] : null;

  const p = (w && pi!=='') ? w.p[pi] : null;

  const onLga=v=>{setLi(v===''?'':+v); setWi(''); setPi('');};
  const onWard=v=>{setWi(v===''?'':+v); setPi('');};

/* ===================== TAB: REPORTS ===================== */
const SEV_ORDER={Critical:0,High:1,Medium:2,Low:3};
function ReportsScreen({incidents, go, initialFilter}){
  const [q,setQ]=useState("");
  const [filter,setFilter]=useState(initialFilter||"All");
  const query=q.toLowerCase().trim();

  const counts={
    total:incidents.length,
    open:incidents.filter(i=>i.status==='Open').length,
    progress:incidents.filter(i=>i.status==='In Progress').length,
    escalated:incidents.filter(i=>i.status==='Escalated').length,
    resolved:incidents.filter(i=>i.status==='Resolved').length,
  };
  const filtered=useMemo(()=>{
    let list=incidents.slice().reverse(); // newest first
    if(filter==='Critical') list=list.filter(i=>i.sev==='Critical'||i.sev==='High');
    else if(filter!=='All') list=list.filter(i=>i.status===filter);
    if(query) list=list.filter(i=>
      (i.title||'').toLowerCase().includes(query)||
      (i.lga||'').toLowerCase().includes(query)||
      (i.ward||'').toLowerCase().includes(query)||
      (i.puName||'').toLowerCase().includes(query)||
      (i.puCode||'').includes(query)||
      (i.reporter||'').toLowerCase().includes(query));
    return list;
  },[incidents,filter,query]);

  const exportCsv=()=>{
    const cols=['Reference','Date','Time','LGA','Ward','PU Code','PU Name','Incident Type','Severity','Description','Reporter Name','Reporter Phone','Status'];
    const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
    const rows=incidents.map(i=>[i.ref,i.date,i.time,i.lga,i.ward,i.puCode,i.puName,i.title,i.sev,i.desc,i.reporter,i.reporterPhone,i.status].map(esc).join(','));
    const csv=[cols.join(','),...rows].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='ekiti_incidents.csv'; a.click();
  };

  return (<>
    <h1 className="screen-h1">Reports</h1>
    <div className="reports-stats">
      <div className="rstat"><strong>{counts.total}</strong><span>Total</span></div>
      <div className="rstat red"><strong>{counts.open}</strong><span>Open</span></div>
      <div className="rstat amber"><strong>{counts.progress}</strong><span>In Prog.</span></div>
      <div className="rstat red"><strong>{counts.escalated}</strong><span>Escalated</span></div>
      <div className="rstat green"><strong>{counts.resolved}</strong><span>Resolved</span></div>
    </div>
    <div className="search-wrap plain"><Ic d={P.search} size={24}/><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search type, location, reporter, code"/>{q&&<button onClick={()=>setQ("")}><Ic d={P.close} size={18}/></button>}</div>
    <div className="filter-chips">
      {['All','Open','In Progress','Escalated','Resolved','Critical'].map(f=>(
        <button key={f} className={`chip ${filter===f?'on':''}`} onClick={()=>setFilter(f)}>{f}</button>))}
    </div>
    {incidents.length>0 && <button className="export-btn" onClick={exportCsv}><Ic d={P.download} size={18}/>Export CSV</button>}

    {filtered.length>0 ? (
      <div className="report-list">
        {filtered.map((it,i)=>{
          const accent=it.sev==='Low'?'green':(it.sev==='Medium'?'amber':'red');
          return (
            <button className={`report-card accent-${accent}`} key={i} onClick={()=>go('detail',it)}>
              <div className="rc-top">
                <h3>{it.title}</h3>
                <span className={`pill st-${(it.status||'').replace(/\s/g,'').toLowerCase()}`}>{it.status}</span>
              </div>
              <p className="rc-loc">{it.puName} — {it.ward}, {it.lga}</p>
              <div className="rc-meta">
                <span className={`pill sev-${(it.sev||'').toLowerCase()}`}>{it.sev}</span>
                <span className="rc-ref">{it.ref}</span>
                <span className="rc-time">{it.date} • {it.time}</span>
              </div>
            </button>);
        })}
      </div>
    ) : (
      <div className="empty-feed">
        <Ic d={P.reports} size={34}/>
        <strong>{incidents.length===0?'No incidents reported yet':'No matches'}</strong>
        <p>{incidents.length===0?'Submitted reports from every polling unit will collect here.':'Try a different search or filter.'}</p>
      </div>
    )}
  </>);
}

function SyncScreen({incidents, online, onResync}){
  const synced=incidents.filter(i=>i.synced).length;
  const pending=incidents.length-synced;
  return (<>
    <h1 className="screen-h1">Sync</h1>
    <div className={`sync-banner ${online?'ok':'off'}`}>
      <Ic d={P.signal} size={22}/>
      <div><strong>{online?'Connected':'Offline'}</strong><p>{online?'Reports sync to the central sheet automatically.':'Reports are saved on this device and will sync when a connection returns.'}</p></div>
    </div>
    <div className="sync-stats">
      <div className="sync-stat green"><Ic d={P.checkCircle} size={26}/><strong>{synced}</strong><span>Synced</span></div>
      <div className="sync-stat amber"><Ic d={P.clock} size={26}/><strong>{pending}</strong><span>Pending</span></div>
    </div>
    {pending>0 && online && <button className="report-btn" onClick={onResync}><Ic d={P.refresh} size={24}/>Sync {pending} pending {pending===1?'report':'reports'}</button>}
    <section>
      <h2 className="sec-title">SUBMITTED ({incidents.length})</h2>
      {incidents.length>0 ? (
        <div className="sync-list">
          {incidents.slice().reverse().map((it,i)=>{
            const errLabels={rate_limited:'Rate limited',duplicate:'Duplicate',out_of_ward:'Wrong ward',
              invalid_phone:'Bad phone',invalid_location:'Bad location',description_too_long:'Too long',
              bad_secret:'Blocked',rejected:'Rejected'};
            const state = it.error ? 'red' : (it.synced ? 'green' : 'amber');
            const tag = it.error ? (errLabels[it.error]||'Rejected') : (it.synced ? 'Synced' : 'Pending');
            return (
              <div className="sync-row" key={i}>
                <span className={`sync-dot ${state}`}></span>
                <div className="sync-copy"><strong>{it.title}</strong><small>{it.ref} • {it.ward}, {it.lga}</small></div>
                <span className={`sync-tag ${state}`}>{tag}</span>

          })}
        </div>
      ) : (
        <div className="empty-feed"><Ic d={P.sync} size={34}/><strong>Nothing to sync</strong><p>Submitted reports and their status will appear here.</p></div>
      )}
    </section>
  </>);
}

/* ===================== LOGIN GATE ===================== */
function LoginGate({onAuth}){
  const [code,setCode]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const submit=()=>{
    if(!code.trim()) return;
    setBusy(true); setErr("");
    fetch(BACKEND_URL+'?action=login&code='+encodeURIComponent(code.trim())+'&secret='+encodeURIComponent(SHARED_SECRET))
      .then(r=>r.json())
      .then(d=>{
        setBusy(false);
        if(d && d.ok){ onAuth({code:code.trim(), role:d.role, perms:d.perms, lga:d.lga||'', ward:d.ward||''}); }
        else if(d && d.error==='bad_secret') setErr("This app build can't reach the server securely. Contact your administrator.");
        else setErr("Invalid access code. Check with your coordinator.");
      })
      .catch(()=>{ setBusy(false); setErr("Couldn't reach the server. Check your connection."); });
  };
  return (
    <div className="bravo-root">
      <style>{CSS}</style>
      <main className="phone-shell gate">
        <div className="title-banner">INCIDENT MANAGEMENT SYSTEM, EKITI 2026</div>
        <div className="gate-body">
          <img src={LOGO} className="gate-logo" alt="The BRAVO"/>
          <h1 className="gate-h1">Enter Access Code</h1>
          <p className="gate-sub">Use the code provided for your role (field agent, coordinator, manager, or observer).</p>
          <div className={`input-field gate-input ${err?'invalid':''}`}>
            <span className="if-icon"><Ic d={P.shield} size={22}/></span>
            <input type="password" value={code} onChange={e=>setCode(e.target.value)}
                   onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Access code" autoFocus/>
          </div>
          {err && <p className="validation-note">{err}</p>}
          <button className={`report-btn ${(!code.trim()||busy)?'disabled':''}`} onClick={submit} disabled={!code.trim()||busy}>
            {busy?'Checking…':<>Enter <Ic d={P.chevR} size={22}/></>}
          </button>
        </div>
      </main>
    </div>
  );
}

/* ===================== ROUTER SHELL ===================== */
function App(){
  const [auth,setAuth]=useState(null); // {code, role, perms} once logged in
  const [tab,setTab]=useState('home');
  const [stack,setStack]=useState([{screen:'lga',ctx:null}]);
  const [incidents,setIncidents]=useState([]); // submitted incidents
  const [contacts,setContacts]=useState({});   // loaded from backend Contacts tab
  const [online,setOnline]=useState(!!BACKEND_URL);
  const [profile,setProfile]=useState({name:'',phone:'',role:'Party Agent'});
  const [reportsFilter,setReportsFilter]=useState('All');
  const cur=stack[stack.length-1];
  const go=(screen, ctx)=>{ setTab('home'); setStack(s=>[...s,{screen,ctx}]); };
  const back=()=>setStack(s=>s.length>1?s.slice(0,-1):s);

  // demo mode (no backend) bypasses the gate with a full-permission stub
  const effectiveAuth = auth || (BACKEND_URL ? null : {code:'', role:'manager', perms:{canReport:true,canUpdateStatus:true,canEscalate:true,canResolve:true,scope:'all'}});
  const perms = effectiveAuth ? effectiveAuth.perms : {};

  // resolve a scoped agent's assigned ward to DATA indices (null if unscoped)
  const scopeIdx = useMemo(()=>{
    if(!effectiveAuth || !effectiveAuth.ward || (perms.scope==='all')) return null;
    const li=DATA.lgas.findIndex(L=>L.n===effectiveAuth.lga);
    if(li<0) return null;
    const wi=DATA.lgas[li].w.findIndex(w=>w.n===effectiveAuth.ward);
    if(wi<0) return null;
    return {lgaIndex:li, wardIndex:wi};
  },[auth]);
  const scoped=!!scopeIdx;

  // land a scoped agent directly in their ward's PU list
  useEffect(()=>{
    if(scoped) setStack([{screen:'pus', ctx:scopeIdx}]);
  },[scopeIdx]);

  const homeStack=()=> scoped ? [{screen:'pus', ctx:scopeIdx}] : [{screen:'lga', ctx:null}];

  const onTab=(key)=>{
    if(key==='home'){ setStack(homeStack()); }
    setTab(key);
  };

  const loadContacts=()=>{
    if(!BACKEND_URL || !effectiveAuth){ if(!BACKEND_URL) setOnline(false); return; }
    fetch(BACKEND_URL+'?action=contacts&code='+encodeURIComponent(effectiveAuth.code)+'&secret='+encodeURIComponent(SHARED_SECRET))
      .then(r=>r.json())
      .then(d=>{ if(d && d.ok && d.contacts){ setContacts(d.contacts); setOnline(true); } })
      .catch(()=>setOnline(false));
  };

  // map a Sheet incident row (column-named) into the app's incident shape
  const mapRow=(row)=>{
    const lga=String(row['LGA']||''), ward=String(row['Ward']||''), puCode=String(row['PU Code']||'');
    const li=DATA.lgas.findIndex(L=>L.n===lga);
    const wi=li>=0?DATA.lgas[li].w.findIndex(w=>w.n===ward):-1;
    const pi=(li>=0&&wi>=0)?DATA.lgas[li].w[wi].p.findIndex(p=>p[0]===puCode):-1;
    return {
      ref:String(row['Reference']||''), title:String(row['Incident Type']||''),
      sev:String(row['Severity']||''), desc:String(row['Description']||''),
      date:String(row['Date']||''), time:String(row['Time']||''),
      status:String(row['Status']||'Open'),
      reporter:String(row['Reporter Name']||''), reporterPhone:String(row['Reporter Phone']||'').replace(/^'/,''),
      lga, ward, puName:String(row['PU Name']||''), puCode,
      lgaIndex:li, wardIndex:wi, puIndex:pi,
      photoLink:String(row['Photo Link']||''), synced:true, error:null,
    };
  };

  const loadIncidents=()=>{
    if(!BACKEND_URL || !effectiveAuth) return;
    fetch(BACKEND_URL+'?action=incidents&code='+encodeURIComponent(effectiveAuth.code)+'&secret='+encodeURIComponent(SHARED_SECRET))
      .then(r=>r.json())
      .then(d=>{
        if(d && d.ok && Array.isArray(d.incidents)){
          setOnline(true);
          const remote=d.incidents.map(mapRow).filter(x=>x.ref);
          // keep any local unsynced/rejected ones the server hasn't acknowledged
          setIncidents(local=>{
            const remoteRefs=new Set(remote.map(x=>x.ref));
            const localOnly=local.filter(x=>!x.synced || x.error || !remoteRefs.has(x.ref));
            return [...remote, ...localOnly];
          });
        }
      })
      .catch(()=>setOnline(false));
  };

  useEffect(()=>{ if(effectiveAuth){ loadContacts(); loadIncidents(); } },[auth]);

  const persist=(rec)=>{
    if(!BACKEND_URL || !effectiveAuth) return;
    fetch(BACKEND_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight Apps Script rejects
      body:JSON.stringify({...rec, code:effectiveAuth.code, op:'create', secret:SHARED_SECRET}),
    }).then(r=>r.json())
      .then(d=>{
        if(d && d.ok){
          setOnline(true);
          setIncidents(list=>list.map(x=>x.ref===rec.ref?{...x, ref:d.reference||rec.ref, synced:true, error:null, photoLink:d.photoLink}:x));
          loadIncidents(); // refresh from server so it shows everywhere
        } else {
          setOnline(true);
          setIncidents(list=>list.map(x=>x.ref===rec.ref?{...x, synced:false, error:(d&&d.error)||'rejected'}:x));
        }
      })
      .catch(()=>setOnline(false));
  };

  // change an incident's status via the backend, then refresh
  const updateStatus=(reference, status)=>{
    // optimistic local update
    setIncidents(list=>list.map(x=>x.ref===reference?{...x, status}:x));
    if(!BACKEND_URL || !effectiveAuth) return Promise.resolve({ok:true});
    return fetch(BACKEND_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({code:effectiveAuth.code, op:'updateStatus', reference, status, secret:SHARED_SECRET}),
    }).then(r=>r.json())
      .then(d=>{ if(d&&d.ok){ setOnline(true); loadIncidents(); } return d; })
      .catch(()=>{ setOnline(false); return {ok:false,error:'offline'}; });
  };

  const submitIncident=(incident)=>{
    const ref='INC-'+new Date().getFullYear()+'-'+String(incidents.length+1).padStart(6,'0');
    const rec={...incident, ref, synced:false};
    setIncidents(list=>[...list, rec]); // optimistic
    setTab('home');
    setStack(s=>{
      const trimmed=s.slice(0,-1);
      return [...trimmed, {screen:'pu', ctx:{lgaIndex:rec.lgaIndex, wardIndex:rec.wardIndex, puIndex:rec.puIndex}}];
    });
    persist(rec);
  };

  const resync=()=>{ incidents.filter(i=>!i.synced).forEach(persist); };

  const logout=()=>{
    setAuth(null);
    setIncidents([]);
    setContacts({});
    setTab('home');
    setStack([{screen:'lga',ctx:null}]);
    setOnline(!!BACKEND_URL);
  };

  // gate: if a backend is configured and we're not authed, show the login
  if(BACKEND_URL && !auth){
    return <LoginGate onAuth={(a)=>{ setAuth(a); }}/>;
  }

  const showBack = tab==='home' && stack.length>1;
  const screenKey = (tab!=='home') ? tab : cur.screen;

  const onStatusFilter=(status)=>{ setReportsFilter(status); setTab('reports'); };
  // label for the back bar = where you'd return to
  const backLabel = (()=>{
    if(stack.length<2) return '';
    const prev=stack[stack.length-2];
    if(prev.screen==='lga') return 'Local Governments';
    if(prev.screen==='wards'){ const L=DATA.lgas[prev.ctx.lgaIndex]; return L?`${L.n} Wards`:'Wards'; }
    if(prev.screen==='pus'){ const L=DATA.lgas[prev.ctx.lgaIndex],w=L&&L.w[prev.ctx.wardIndex]; return w?w.n:'Polling Units'; }
    if(prev.screen==='pu') return 'Polling Unit';
    return 'Back';
  })();

  let body;
  if(tab==='reports') body=<ReportsScreen incidents={incidents} go={go} initialFilter={reportsFilter} key={'rep-'+reportsFilter}/>;
  else if(tab==='sync') body=<SyncScreen incidents={incidents} online={online} onResync={resync}/>;
  else if(tab==='profile') body=<ProfileScreen profile={profile} setProfile={setProfile} online={online} contactsCount={Object.keys(contacts).length} incidents={incidents} onRefresh={()=>{loadContacts();loadIncidents();}} accessRole={effectiveAuth&&effectiveAuth.role} onLogout={auth?logout:null}/>;
  else if(cur.screen==='lga') body=<LgaScreen go={go} incidents={incidents} onStatusFilter={onStatusFilter}/>;
  else if(cur.screen==='wards') body=<WardScreen go={go} ctx={cur.ctx} contacts={contacts}/>;
  else if(cur.screen==='pus') body=<PuListScreen go={go} ctx={cur.ctx} contacts={contacts} perms={perms}/>;
  else if(cur.screen==='pu') body=<PuScreen go={go} ctx={cur.ctx} incidents={incidents} contacts={contacts} perms={perms}/>;
  else if(cur.screen==='report') body=<ReportScreen go={go} ctx={cur.ctx} onSubmit={submitIncident} profile={profile} lockLocation={scoped}/>;
  else if(cur.screen==='detail') body=<DetailScreen item={cur.ctx} perms={perms} incidents={incidents} onUpdateStatus={updateStatus}/>;

  return (<div className="bravo-root">
    <style>{CSS}</style>
    <main className="phone-shell">
      <AppHeader onBack={back} showBack={showBack} online={online} role={effectiveAuth&&effectiveAuth.role}/>
      {showBack && <button className="back-bar" onClick={back}><Ic d={P.back} size={20}/><span>Back to {backLabel}</span></button>}
      <div className={`content screen-${screenKey}`} key={screenKey+'-'+stack.length}>{body}</div>
      <BottomNav active={tab} onTab={onTab}/>
    </main>
  </div>);
}

/* ===================== STYLES ===================== */
const CSS = `
:root{--green:#078a19;--deep:#006b3a;--light:#eaf7e2;--red:#dc2626;--amber:#f59e0b;--blue:#1d6fe9;--text:#111827;--muted:#64748b;--line:#d9dee7}
*{box-sizing:border-box}
html,body{max-width:100%;overflow-x:hidden}

/* ===== motion ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:scale(.96)}100%{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}

/* whole-screen entrance: content fades+slides up when it (re)mounts per screen */
.content{animation:fadeUp .28s cubic-bezier(.22,.61,.36,1) both}

/* staggered entrance for list rows / cards within a screen */
.lga-card,.ward-card,.pu-row,.result-row,.incident-card,.report-card,.stat-card,.rstat,.statbox,.sync-row,.esc-item{animation:fadeUp .32s cubic-bezier(.22,.61,.36,1) both}
.lga-list>*:nth-child(1),.ward-list>*:nth-child(1),.pu-list>*:nth-child(1),.report-list>*:nth-child(1),.incident-list>*:nth-child(1){animation-delay:.02s}
.lga-list>*:nth-child(2),.ward-list>*:nth-child(2),.pu-list>*:nth-child(2),.report-list>*:nth-child(2),.incident-list>*:nth-child(2){animation-delay:.05s}
.lga-list>*:nth-child(3),.ward-list>*:nth-child(3),.pu-list>*:nth-child(3),.report-list>*:nth-child(3),.incident-list>*:nth-child(3){animation-delay:.08s}
.lga-list>*:nth-child(4),.ward-list>*:nth-child(4),.pu-list>*:nth-child(4),.report-list>*:nth-child(4),.incident-list>*:nth-child(4){animation-delay:.11s}
.lga-list>*:nth-child(5),.ward-list>*:nth-child(5),.pu-list>*:nth-child(5),.report-list>*:nth-child(5),.incident-list>*:nth-child(5){animation-delay:.14s}
.lga-list>*:nth-child(6),.ward-list>*:nth-child(6),.pu-list>*:nth-child(6),.report-list>*:nth-child(6),.incident-list>*:nth-child(6){animation-delay:.17s}
.lga-list>*:nth-child(n+7),.ward-list>*:nth-child(n+7),.pu-list>*:nth-child(n+7),.report-list>*:nth-child(n+7),.incident-list>*:nth-child(n+7){animation-delay:.19s}

/* tactile press feedback on interactive cards/buttons */
.lga-card,.ward-card,.pu-row,.result-row,.incident-card,.report-card,.report-btn,.action-grid button,.sev-btn,.chip,.bottom-nav button,.esc-phone,.ghost-btn,.export-btn,.menu-button,.status-opt,.logout-btn{transition:transform .12s ease,box-shadow .18s ease,background .15s ease,border-color .15s ease,color .15s ease}
.lga-card:active,.ward-card:active,.pu-row:active,.result-row:active,.incident-card:active,.report-card:active,.report-btn:active,.action-grid button:active,.sev-btn:active,.chip:active,.esc-phone:active,.ghost-btn:active,.export-btn:active,.status-opt:active{transform:scale(.975)}
.lga-card:hover,.ward-card:hover,.pu-row:hover,.result-row:hover,.incident-card:hover,.report-card:hover{box-shadow:0 10px 28px rgba(15,23,42,.10);transform:translateY(-1px)}
.bottom-nav button:active{transform:scale(.9)}

/* online dot gently pulses; report submit spinner; gate stagger */
.online span{animation:pulse 2.4s ease-in-out infinite}
.gate-logo{animation:popIn .5s cubic-bezier(.22,.61,.36,1) both}
.gate-h1{animation:fadeUp .5s .08s cubic-bezier(.22,.61,.36,1) both}
.gate-sub{animation:fadeUp .5s .16s cubic-bezier(.22,.61,.36,1) both}
.gate-input{animation:fadeUp .5s .24s cubic-bezier(.22,.61,.36,1) both}
.gate-body .report-btn{animation:fadeUp .5s .32s cubic-bezier(.22,.61,.36,1) both}

/* respect users who prefer reduced motion */
@media(prefers-reduced-motion:reduce){
  *,.content,.lga-card,.ward-card,.pu-row,.result-row,.incident-card,.report-card,.stat-card,.rstat,.statbox,.sync-row,.esc-item,.gate-logo,.gate-h1,.gate-sub,.gate-input,.gate-body .report-btn,.online span{animation:none!important;transition:none!important}
}

.sb-label{font-size:12.5px;font-weight:700;margin:0}
.sb-value{font-size:26px;font-weight:900;margin:6px 0 0;letter-spacing:-.02em}
.sb-value.sm{font-size:18px;color:#0f172a}
.report-btn{display:flex;align-items:center;justify-content:center;gap:14px;width:100%;height:60px;border:0;border-radius:16px;background:var(--green);color:#fff;font-size:21px;font-weight:900;box-shadow:0 10px 24px rgba(7,138,25,.28);margin-bottom:26px}
.section-head{display:flex;justify-content:space-between;align-items:center}
.filter-btn{border:0;background:transparent;color:#0f172a;font-weight:700;display:flex;align-items:center;gap:8px}
.incident-list{display:grid;gap:14px}
.incident-card{display:flex;gap:14px;border:1px solid #e2e8f0;border-left-width:4px;border-radius:16px;background:#fff;padding:16px;box-shadow:0 4px 12px rgba(15,23,42,.05);text-align:left;cursor:pointer}
.incident-card.accent-red{border-left-color:var(--red)}.incident-card.accent-amber{border-left-color:#f59e0b}.incident-card.accent-green{border-left-color:#047857}
.inc-icon{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;color:#fff;flex:none;margin-top:2px}
.inc-icon.red{background:var(--red)}.inc-icon.amber{background:#475569}.inc-icon.green{background:#047857}
.inc-body{flex:1;min-width:0}
.inc-top{display:flex;justify-content:space-between;gap:12px}
.inc-top h3{font-size:18px;font-weight:900;margin:0}
.inc-desc{font-size:14.5px;color:#0f172a;margin:5px 0 0;line-height:1.4}
.inc-top-right{display:flex;align-items:flex-start;gap:8px;flex:none}
.inc-time{font-size:13.5px;color:#64748b;font-weight:500;margin-top:3px}
.inc-more{border:0;background:transparent;color:#0f172a;padding:2px;display:grid;place-items:center}
.inc-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;font-size:14px}
.meta-pair{display:flex;align-items:center;gap:8px}
.meta-pair.end{justify-content:flex-end}
.meta-key{font-weight:800}
.pill{border-radius:9px;padding:5px 11px;font-weight:900;font-size:13px}
.sev-high,.st-open,.st-escalated{background:#fee2e2;color:#b91c1c}
.sev-medium,.st-inprogress{background:#fef3c7;color:#b45309}
.sev-low,.st-resolved{background:#dcfce7;color:#15803d}

/* screen 5 */
.title-row{display:grid;grid-template-columns:58px 1fr 44px;align-items:center;gap:14px;margin-bottom:16px}
.incident-avatar{width:58px;height:58px;border-radius:50%;background:var(--red);display:grid;place-items:center;color:#fff}
.incident-avatar .ic{width:30px;height:30px}
.title-meta{display:flex;gap:14px;align-items:center;margin-top:6px;color:#475569;font-weight:600}
.badge{border-radius:8px;padding:6px 13px;font-weight:800;display:inline-flex;align-items:center}
.outline-red{border:1.5px solid var(--red);color:var(--red);background:#fff}
.soft-red{color:var(--red);background:#fee2e2}
.menu-button{height:44px;width:44px;border:1px solid var(--line);border-radius:12px;background:#fff;color:#111;display:grid;place-items:center}
.details-card{border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:0 10px 25px rgba(15,23,42,.05);overflow:hidden}
.detail-row{display:grid;grid-template-columns:32px 118px 1fr;gap:10px;align-items:start;padding:15px 14px;border-bottom:1px solid var(--line)}
.detail-icon{display:grid;place-items:center}
.detail-icon .ic{width:21px;height:21px}
.detail-icon.red{color:var(--red)}.detail-icon.orange{color:var(--amber)}.detail-icon.green{color:var(--green)}.detail-icon.blue{color:var(--blue)}
.detail-label{font-weight:800}
.detail-value{font-weight:500;line-height:1.35}
.last-updated{display:grid;grid-template-columns:150px 1fr;padding:14px}
.last-updated span{font-weight:700}.last-updated strong{font-weight:500}
.photo-section,.timeline-section,.actions{margin-top:18px}
.photo-card{width:104px;height:82px;border-radius:9px;position:relative;overflow:hidden}
.photo-card img{width:100%;height:100%;object-fit:cover}
.photo-card span{position:absolute;right:7px;bottom:7px;background:rgba(0,0,0,.7);color:#fff;border-radius:50%;width:28px;height:28px;display:grid;place-items:center}
.photo-card span .ic{width:17px;height:17px}
.timeline-section{border-top:1px solid var(--line);padding-top:16px}
.timeline{position:relative;padding-left:2px}
.timeline:before{content:"";position:absolute;left:10px;top:28px;bottom:28px;width:1px;background:#d7dce5}
.timeline-item{position:relative;display:grid;grid-template-columns:62px minmax(0,1fr) 78px;column-gap:12px;align-items:start;padding:14px 0;border-bottom:1px solid var(--line)}
.rail-dot{position:absolute;left:5px;top:31px;width:11px;height:11px;border-radius:50%;background:#cbd5e1}
.timeline-item:first-child .rail-dot{background:var(--green)}
.timeline-icon{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#fff;margin-left:24px}
.timeline-icon .ic{width:22px;height:22px}
.timeline-icon.green{background:var(--green)}.timeline-icon.amber{background:var(--amber)}.timeline-icon.red{background:var(--red)}
.timeline-copy h3{font-size:16px;margin:0 0 4px}
.timeline-copy p{margin:0;color:#334155;font-size:14px;line-height:1.35}
.t-time{white-space:pre-line;text-align:right;color:#475569;font-size:13px;line-height:1.45}
.action-grid{display:grid;grid-template-columns:1fr;gap:10px}
.action-grid button{height:48px;border-radius:10px;background:#fff;font-weight:850;display:flex;align-items:center;justify-content:center;gap:10px}
.action-grid .green{border:1.5px solid var(--green);color:var(--green)}
.action-grid .blue{border:1.5px solid var(--blue);color:var(--blue)}
.action-grid .red{border:1.5px solid var(--red);color:var(--red)}

/* screen 4 - report form */
.req-note{font-size:16px;color:#475569;margin:0 0 22px}
.req-note i{color:var(--red);font-style:normal;font-weight:800}
.field-label{display:block;font-size:16px;font-weight:800;margin:0 0 9px}
.field-label.plain{margin-top:4px}
.field-label i{color:var(--red);font-style:normal}
.select-wrap{position:relative;display:flex;align-items:center;border:1px solid #cbd5e1;border-radius:14px;background:#fff;height:64px;padding:0 14px;margin-bottom:22px}
.select-icon{width:38px;height:38px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;flex:none;margin-right:14px}
.select-wrap select{flex:1;border:0;outline:0;background:transparent;font-size:18px;font-weight:600;color:#111;-webkit-appearance:none;appearance:none}
.select-chev{color:#111;pointer-events:none}
.sev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:22px}
.sev-btn{height:56px;border-radius:13px;font-size:16px;font-weight:800;background:#fff;border:1.5px solid #cbd5e1;color:#475569;transition:all .12s}
.sev-btn.sev-low.on{background:#e9f8e4;border-color:var(--green);color:var(--green)}
.sev-btn.sev-medium.on{background:#fff7e6;border-color:#f59e0b;color:#d97706}
.sev-btn.sev-high.on{background:#fde8e8;border-color:#f87171;color:var(--red)}
.sev-btn.sev-critical.on{background:#fff;border-color:var(--red);color:var(--red)}
.textarea-wrap{position:relative;margin-bottom:22px}
.textarea-wrap textarea{width:100%;border:1.5px solid var(--green);border-radius:14px;background:#fff;padding:16px;font-size:17px;line-height:1.45;color:#111;resize:none;outline:0;font-family:inherit;min-height:140px}
.char-count{position:absolute;right:16px;bottom:14px;font-size:14px;color:#64748b}
.datetime-field{display:flex;align-items:center;gap:14px;border:1px solid #cbd5e1;border-radius:14px;background:#fff;height:60px;padding:0 16px;margin-bottom:22px}
.dt-icon{color:var(--green);display:grid;place-items:center}
.dt-date{font-size:17px;font-weight:600}
.dt-divider{width:1px;height:28px;background:#cbd5e1}
.dt-time{font-size:17px;font-weight:600}
.input-field{display:flex;align-items:center;gap:14px;border:1px solid #cbd5e1;border-radius:14px;background:#fff;height:60px;padding:0 16px;margin-bottom:22px}
.if-icon{color:var(--green);display:grid;place-items:center}
.input-field input{flex:1;border:0;outline:0;background:transparent;font-size:17px;font-weight:600;color:#111}
.photo-drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:2px dashed var(--green);border-radius:16px;background:#fafdf9;padding:30px 16px;margin-bottom:24px;cursor:pointer;text-align:center;min-height:150px}
.cam-circle{width:56px;height:56px;border-radius:50%;background:#daf2d2;color:var(--green);display:grid;place-items:center}
.drop-text{font-size:16px;color:#475569;line-height:1.5}
.photo-preview{max-width:100%;max-height:200px;border-radius:12px;object-fit:contain}
.report-btn.submit{margin-bottom:14px}
.offline-note{display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;color:#475569;margin:0 0 8px}

/* real-data additions */
.result-row{display:grid;grid-template-columns:auto 1fr 22px;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:13px 14px;text-align:left;box-shadow:0 4px 12px rgba(15,23,42,.04)}
.result-kind{font-size:10px;font-weight:900;letter-spacing:.06em;padding:4px 8px;border-radius:7px;color:#fff;flex:none}
.result-kind.lga{background:#0f766e}.result-kind.ward{background:#1d6fe9}.result-kind.pu{background:#078a19}
.result-copy{display:grid;gap:2px;min-width:0}
.result-copy strong{font-size:15px;font-weight:800;line-height:1.25}
.result-copy small{font-size:12.5px;color:#64748b}
.result-row>.ic{color:#94a3b8}
.pu-list{display:grid;gap:10px}
.pu-row{display:grid;grid-template-columns:auto 1fr 22px;align-items:center;gap:13px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:13px 14px;text-align:left;box-shadow:0 4px 12px rgba(15,23,42,.04)}
.pu-no{min-width:40px;height:40px;padding:0 8px;border-radius:10px;background:var(--light);color:var(--green);font-weight:900;font-size:15px;display:grid;place-items:center;flex:none}
.pu-row-copy{display:grid;gap:2px;min-width:0}
.pu-row-copy strong{font-size:15px;font-weight:700;line-height:1.3}
.pu-row-copy small{font-size:12px;color:#94a3b8;letter-spacing:.02em}
.pu-row>.ic{color:#94a3b8}
.pu-code{font-size:13px;color:#94a3b8;margin:6px 0 0;letter-spacing:.03em}
.pu-code-note{font-size:13px;color:var(--green);font-weight:700;margin:-14px 0 20px;letter-spacing:.03em}
.empty-feed{text-align:center;padding:34px 16px;color:#64748b;border:1px dashed #cbd5e1;border-radius:16px;background:#fafafa;display:grid;justify-items:center;gap:8px}
.empty-feed strong{font-size:16px;color:#334155}
.empty-feed p{margin:0;font-size:14px}
.escalation-card.empty .esc-empty{margin:0;color:#64748b;font-size:14px;line-height:1.5}
.select-wrap.disabled{background:#f1f5f9;border-color:#e2e8f0}
.select-wrap.disabled .select-icon{background:#cbd5e1}
.select-wrap.disabled select{color:#94a3b8}
.report-btn.submit.disabled,.report-btn.submit:disabled{background:#cbd5e1;box-shadow:none;cursor:not-allowed}
.validation-note{text-align:center;font-size:13.5px;color:#dc2626;margin:-6px 0 10px}
.input-field.invalid{border-color:#dc2626}
.input-field.invalid .if-icon{color:#dc2626}
.detail-phone{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-weight:700;text-decoration:none;margin-top:4px}

/* tabs: reports / sync / profile */
.reports-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.rstat{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px 6px;text-align:center;box-shadow:0 4px 12px rgba(15,23,42,.04)}
.rstat strong{display:block;font-size:22px;font-weight:900}
.rstat span{font-size:12px;color:#64748b;font-weight:600}
.rstat.red strong{color:var(--red)}.rstat.green strong{color:var(--green)}.rstat.amber strong{color:#d97706}
.filter-chips{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.chip{border:1.5px solid #cbd5e1;background:#fff;color:#475569;border-radius:999px;padding:8px 16px;font-weight:700;font-size:14px}
.chip.on{border-color:var(--green);background:var(--light);color:var(--green)}
.export-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:48px;border:1.5px solid var(--green);border-radius:12px;background:#fff;color:var(--green);font-weight:800;margin-bottom:18px}
.report-list{display:grid;gap:12px}
.report-card{display:block;width:100%;text-align:left;border:1px solid var(--line);border-left-width:4px;border-radius:14px;background:#fff;padding:15px;box-shadow:0 4px 12px rgba(15,23,42,.05)}
.report-card.accent-red{border-left-color:var(--red)}.report-card.accent-amber{border-left-color:#f59e0b}.report-card.accent-green{border-left-color:#047857}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.rc-top h3{font-size:16px;font-weight:800;margin:0}
.rc-loc{margin:6px 0 10px;font-size:14px;color:#475569;line-height:1.4}
.rc-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rc-ref{font-size:12px;color:#94a3b8;font-weight:700;letter-spacing:.02em}
.rc-time{font-size:12.5px;color:#64748b;margin-left:auto}

.sync-banner{display:flex;gap:14px;align-items:flex-start;border-radius:16px;padding:16px;margin-bottom:18px}
.sync-banner.ok{background:#eaf7e2;color:#15803d}
.sync-banner.off{background:#fef3c7;color:#92400e}
.sync-banner strong{display:block;font-size:16px;margin-bottom:3px}
.sync-banner p{margin:0;font-size:13.5px;line-height:1.4;color:#475569}
.sync-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.sync-stat{border:1px solid var(--line);border-radius:16px;background:#fff;padding:16px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:0 4px 12px rgba(15,23,42,.04)}
.sync-stat strong{font-size:26px;font-weight:900}
.sync-stat span{font-size:13px;color:#64748b;font-weight:600}
.sync-stat.green{color:var(--green)}.sync-stat.amber{color:#d97706}
.sync-list{display:grid;gap:10px}
.sync-row{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:13px 14px}
.sync-dot{width:10px;height:10px;border-radius:50%;flex:none}
.sync-dot.green{background:var(--green)}.sync-dot.amber{background:#f59e0b}.sync-dot.red{background:var(--red)}
.sync-copy{flex:1;min-width:0}
.sync-copy strong{display:block;font-size:15px;font-weight:700}
.sync-copy small{font-size:12.5px;color:#94a3b8}
.sync-tag{font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px}
.sync-tag.green{background:#dcfce7;color:#15803d}.sync-tag.amber{background:#fef3c7;color:#b45309}.sync-tag.red{background:#fee2e2;color:#b91c1c}

.status-card{margin-top:24px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:18px}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:15px}
.status-row strong{font-weight:800}
.status-row strong.green{color:var(--green)}.status-row strong.muted{color:#94a3b8}
.ghost-btn.full{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:14px;height:46px}

/* login gate + role */
.phone-shell.gate{padding-bottom:0;display:flex;flex-direction:column;min-height:100vh}
.gate-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 28px 44px;text-align:center;max-width:380px;margin:0 auto;width:100%}
.gate-logo{width:132px;height:auto;object-fit:contain;margin:0 0 14px}
.gate-h1{font-size:24px;font-weight:900;letter-spacing:-.02em;margin:0 0 6px}
.gate-sub{font-size:14px;color:#475569;line-height:1.45;margin:0 0 20px;max-width:300px}
.gate-input{width:100%;max-width:340px;margin-bottom:8px}
.gate-body .report-btn{width:100%;max-width:340px;margin-top:8px}
.role-strip{background:#f1f5f9;border-top:1px solid var(--line);font-size:12.5px;color:#64748b;text-align:center;padding:6px}
.role-strip strong{color:var(--green);font-weight:800}
.readonly-note{text-align:center;color:#64748b;font-size:14px;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:16px;margin:0}
.outline-green{border:1.5px solid var(--green);color:var(--green);background:#fff}
.soft-green{color:#15803d;background:#dcfce7}
.soft-amber{color:#b45309;background:#fef3c7}
.status-picker{border:1px solid var(--line);border-radius:14px;background:#fff;padding:16px}
.status-picker-title{margin:0 0 12px;font-weight:800;font-size:15px}
.status-options{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.status-opt{height:46px;border:1.5px solid #cbd5e1;border-radius:10px;background:#fff;font-weight:800;color:#475569}
.status-opt.on{border-color:var(--green);background:var(--light);color:var(--green)}
.status-opt:disabled{opacity:.5}
.logout-btn{display:flex;align-items:center;justify-content:center;gap:10px;border:1.5px solid var(--red);color:var(--red);background:#fff;border-radius:12px;height:48px;font-weight:800;padding:0 18px}
.logout-btn.full{width:100%;margin-top:22px}
.logout-confirm{margin-top:22px;border:1px solid #fecaca;background:#fef2f2;border-radius:14px;padding:16px}
.logout-confirm p{margin:0 0 14px;font-size:14px;color:#7f1d1d;line-height:1.5}
.logout-actions{display:flex;gap:10px}
.logout-actions .ghost-btn{flex:1;justify-content:center}
.logout-actions .logout-btn{flex:1}

/* nav */
.bottom-nav{position:absolute;bottom:0;left:0;width:100%;height:78px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);box-shadow:0 -12px 40px rgba(15,23,42,.05)}
.bottom-nav button{border:0;background:transparent;display:grid;place-items:center;color:#344054;padding:8px 0;gap:3px}
.bottom-nav .ic{width:25px;height:25px}
.bottom-nav span{font-size:13px}
.bottom-nav .active{color:var(--green);font-weight:800}
/* ===== tablet: slightly wider phone frame ===== */
@media(min-width:768px) and (max-width:1023px){
  .bravo-root{display:flex;justify-content:center;align-items:flex-start;padding:30px 16px}
  .phone-shell{width:min(100%,560px);border-radius:28px;margin:0;overflow:hidden;min-height:calc(100vh - 60px);box-shadow:0 30px 90px rgba(15,23,42,.18)}
  .action-grid{grid-template-columns:repeat(3,1fr)}
}

/* ===== desktop: full web layout (Option B) ===== */
@media(min-width:1024px){
  .bravo-root{background:#f4f6f9}
  .phone-shell{width:100%;max-width:100%;min-height:100vh;margin:0;border-radius:0;box-shadow:none;padding-bottom:96px}
  .top-header{box-shadow:0 1px 0 rgba(15,23,42,.06)}
  .status-bar{display:none}                 /* hide the fake phone status bar on web */
  .title-banner{font-size:18px;letter-spacing:.05em;padding:12px}
  .header-row{max-width:1180px;margin:0 auto;height:84px;padding:0 32px}
  .logo{width:170px;height:66px}
  .role-strip{text-align:right;padding:6px 32px;max-width:1180px;margin:0 auto;width:100%}

  /* centered working area */
  .content{max-width:1180px;margin:0 auto;padding:30px 32px}

  /* bottom nav becomes a full-width fixed bar */
  .bottom-nav{position:fixed;left:0;right:0;width:100%;height:64px;grid-template-columns:repeat(4,minmax(0,200px));justify-content:center;gap:40px}
  .bottom-nav button{flex-direction:row;gap:8px}
  .bottom-nav .ic{width:22px;height:22px}

  /* default action grid 3-up */
  .action-grid{grid-template-columns:repeat(3,1fr);max-width:560px}

  /* HOME — LGA grid 3-up, stats 4-up full width */
  .screen-lga .lga-list{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .screen-lga .lga-card{box-shadow:0 6px 18px rgba(15,23,42,.05)}

  /* WARD list + PU list: two columns (list left, contacts right) */
  .screen-wards, .screen-pus{display:grid;grid-template-columns:1fr 360px;grid-template-areas:"head head" "list aside";gap:28px;align-items:start}
  .screen-wards > .breadcrumbs, .screen-pus > .breadcrumbs,
  .screen-wards > .screen-h1, .screen-pus > .screen-h1,
  .screen-wards > .search-wrap, .screen-pus > .search-wrap,
  .screen-pus > .report-btn{grid-column:1 / -1}
  .screen-wards .escalation-card, .screen-pus .escalation-card{grid-area:aside;position:sticky;top:120px;margin:0}
  .screen-wards > section:last-of-type, .screen-pus > section:last-of-type{grid-area:list}
  .screen-pus .pu-list{grid-template-columns:repeat(2,1fr)}

  /* PU screen: feed left, stats+contacts right */
  .screen-pu{display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start}
  .screen-pu > .breadcrumbs, .screen-pu > .pu-head{grid-column:1 / -1}
  .screen-pu .pu-stats{grid-column:1 / -1;max-width:none}
  .screen-pu .report-btn{grid-column:1 / -1;max-width:380px}
  .screen-pu .escalation-card{grid-column:2;grid-row:span 3;position:sticky;top:120px;margin:0}
  .screen-pu .pu-incidents{grid-column:1}

  /* REPORT form: centered, readable width (never stretched) */
  .screen-report{max-width:640px;margin:0 auto}
  .screen-report .sev-grid{grid-template-columns:repeat(4,1fr)}

  /* DETAIL: centered readable width */
  .screen-detail{max-width:720px;margin:0 auto}

  /* REPORTS: grid of cards + stats 4-up */
  .screen-reports .report-list{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .screen-reports .report-card{display:flex;flex-direction:column}

  /* SYNC + PROFILE: centered column */
  .screen-sync, .screen-profile{max-width:680px;margin:0 auto}
}

/* ===== wide desktop: a touch more room ===== */
@media(min-width:1440px){
  .screen-lga .lga-list{grid-template-columns:repeat(4,1fr)}
  .screen-reports .report-list{grid-template-columns:repeat(3,1fr)}
}
`;

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
